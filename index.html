<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body{background:#111; color:#0f0; font-family:"SimSun-ExtB"; padding:20px;}
        textarea{width:100%;height:120px;background:#000;color:#0f0;border:1px solid #090;}
        button{padding:10px 20px;background:#060;color:#fff;border:0;cursor:pointer;margin:5px;}
    </style>
</head>
<body>
    <h1>最终版：O| + JSON + 16进制 + 3进制</h1>
    输入：<textarea id="input">测试123 Hello!</textarea><br>
    <button onclick="goEnc()">加密</button><br>
    最终加密结果：<textarea id="out1" readonly></textarea>

<script>
// 核心：0→O  1→|
function toO(bit){
    return bit.replaceAll('0','O').replaceAll('1','|');
}

// 文本 → 二进制01
function str2bin(s){
    let u = new TextEncoder().encode(s);
    return Array.from(u).map(b=>b.toString(2).padStart(8,'0')).join('');
}

// ====================== 加密主程序（无函数、硬编码） ======================
function goEnc(){
    let txt = document.getElementById("input").value;

    // 1. 文本 → 二进制
    let bin = str2bin(txt);

    // 2. 0→O 1→|
    let o = toO(bin);

    // 3. 装进JSON
    let json = JSON.stringify({d:o});

    // ==============================================
    // 4. 【JSON 字符串 → 16进制】（纯手动、无函数）
    // ==============================================
    let hex = "";
    for(let i=0;i<json.length;i++){
        let code = json.charCodeAt(i);
        hex += code.toString(16).padStart(2,"0");
    }

    // ==============================================
    // 5. 【16进制 → 3进制】（纯手动、无函数）
    // ==============================================
    let num = BigInt("0x" + hex);
    let tern = "";
    while(num > 0){
        tern = (num % 3n).toString() + tern;
        num = num / 3n;
    }

    // 6. 最终输出：MZ + 3进制
    document.getElementById("out1").value = "O|-JSON-s\n" + tern;
}
</script>
</body>
</html>
