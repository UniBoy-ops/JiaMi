<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body{background:#111; color:#0f0; font-family: monospace; padding:20px;}
        textarea{width:100%;height:140px;background:#000;color:#0f0;border:1px solid #090;}
        button{padding:10px 20px;background:#060;color:#fff;border:0;cursor:pointer;margin:5px;}
    </style>
</head>
<body>
    <h1>✅ 最终终极版：全流程 + Unicode + 自定义反码</h1>
    输入：<textarea id="input">测试123 Hello!</textarea><br>
    <button onclick="goEnc()">加密</button><br>
    最终加密结果：<textarea id="out1" readonly></textarea>

<script>
// 0→O 1→|
function toO(bit){
    return bit.replaceAll('0','O').replaceAll('1','|');
}

// 文本 → 二进制
function str2bin(s){
    let u = new TextEncoder().encode(s);
    return Array.from(u).map(b=>b.toString(2).padStart(8,'0')).join('');
}

// ====================== 完整加密流程 ======================
function goEnc(){
    let txt = document.getElementById("input").value;

    // 1. 文本 → 二进制
    let bin = str2bin(txt);

    // 2. O|替换
    let o = toO(bin);

    // 3. JSON包装
    let json = JSON.stringify({d:o});

    // 4. JSON → 16进制
    let hex1 = "";
    for(let i=0;i<json.length;i++){
        let code = json.charCodeAt(i);
        hex1 += code.toString(16).padStart(2,"0");
    }

    // 5. 16进制 → 3进制
    let num = BigInt("0x"+hex1);
    let ter = "";
    while(num > 0n){
        ter = (num % 3n).toString() + ter;
        num = num / 3n;
    }

    // 6. 3进制 → Unicode 十六进制 (4位)
    let unicodeHex = "";
    for(let i=0;i<ter.length;i++){
        let c = ter.charCodeAt(i);
        unicodeHex += c.toString(16).padStart(4, "0");
    }

    // ==============================================
    // 7. 【你要的：自定义反码】 ! → }    z → $
    // ==============================================
    let finalStr = unicodeHex;
    finalStr = finalStr.replaceAll("!", "}");  // ! 反码
    finalStr = finalStr.replaceAll("z", "$");   // z 反码

    // 8. 输出 MZ + 最终字符串
    document.getElementById("out1").value = "MZ" + finalStr;
}
</script>
</body>
</html>
